services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mail-gmail-backend
    environment:
      DATABASE_URL: sqlite:////app/backend/data/app.db
      MASTER_KEY: ${MASTER_KEY:-change-me-to-a-long-random-secret}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:5173}
      DEFAULT_INITIAL_SYNC_DAYS: ${DEFAULT_INITIAL_SYNC_DAYS:-30}
      DEFAULT_INITIAL_SYNC_LIMIT: ${DEFAULT_INITIAL_SYNC_LIMIT:-1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://127.0.0.1:8000}
    container_name: mail-gmail-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
